spring.datasource.url=jdbc:h2:mem:barberdb;DB_CLOSE_DELAY=-1
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=password

# Esto es vital para que no te genere nombres aleatorios
spring.jpa.hibernate.ddl-auto=update
spring.h2.console.enabled=true

spring.security.oauth2.client.registration.google.client-id=tu 
spring.security.oauth2.client.registration.google.client-secret=tu
spring.security.oauth2.client.registration.google.scope=profile,email