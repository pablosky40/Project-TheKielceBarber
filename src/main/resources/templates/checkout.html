<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Checkout | The Kielce Barber</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;800&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #d4af37; --dark-card: rgba(0, 0, 0, 0.85); }
        body { 
            background: linear-gradient(rgba(0,0,0,0.92), rgba(0,0,0,0.95)), url('/images/fondo.jpg') no-repeat center center fixed; 
            background-size: cover; color: white; font-family: 'Montserrat', sans-serif; min-height: 100vh; 
        }
        .checkout-card { background: var(--dark-card); border: 1px solid var(--gold); border-radius: 25px; padding: 40px; backdrop-filter: blur(15px); }
        
        .payment-option { 
            border: 1px solid rgba(212, 175, 55, 0.2); border-radius: 15px; padding: 20px; 
            cursor: pointer; transition: 0.3s; background: rgba(255,255,255,0.03);
        }
        .payment-option.active { border-color: var(--gold); background: rgba(212, 175, 55, 0.1); }
        .payment-option:hover { border-color: var(--gold); }
        
        .btn-pay { background: var(--gold); color: black; font-weight: 800; border-radius: 50px; border: none; padding: 15px; width: 100%; transition: 0.3s; margin-top: 20px; }
        .btn-pay:hover { background: white; transform: scale(1.02); }
        
        .btn-back {
            color: var(--gold); text-decoration: none; font-size: 0.9rem; font-weight: 700;
            transition: 0.3s; display: inline-flex; align-items: center; margin-bottom: 20px;
        }
        .btn-back:hover { color: white; transform: translateX(-5px); }
        .form-check-input:checked { background-color: var(--gold); border-color: var(--gold); }
        .text-gold { color: var(--gold); }
    </style>
</head>
<body>
    <div class="container py-5">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <a th:href="@{/appointments/new}" class="btn-back">
                    <i class="bi bi-arrow-left-circle me-2 fs-5"></i> BACK TO BOOKING
                </a>

                <div class="checkout-card shadow-lg">
                    <h2 class="text-gold fw-800 mb-4 text-center">FINAL STEP</h2>
                    
                    <div class="mb-4 p-3 rounded" style="background: rgba(255,255,255,0.05); border: 1px dotted rgba(212,175,55,0.3);">
                        <p class="mb-1 small"><i class="bi bi-scissors text-gold me-2"></i> <span th:text="${appointment.service.name}">Service</span></p>
                        <p class="mb-1 small"><i class="bi bi-calendar-event text-gold me-2"></i> <span th:text="${appointment.date}">Date</span> at <span th:text="${appointment.time}">Time</span></p>
                        <p class="mb-0 fw-bold fs-4 text-gold text-center mt-2" th:text="${appointment.price} + '€'">0.0€</p>
                    </div>

                    <!-- OPCIÓN 1: PAGO ONLINE (STRIPE) -->
                    <h6 class="text-gold mb-3 small fw-bold text-uppercase">Payment Method</h6>
                    
                    <div id="optionOnline" class="payment-option mb-3 active" onclick="selectPayment('online')">
                        <div class="d-flex justify-content-between align-items-center">
                            <span><i class="bi bi-credit-card-2-front me-2"></i> Online Payment (Credit Card)</span>
                            <i class="bi bi-check-circle-fill text-gold" id="iconOnline"></i>
                        </div>
                    </div>

                    <!-- OPCIÓN 2: PAGO OFFLINE -->
                    <div id="optionOffline" class="payment-option mb-4" onclick="selectPayment('offline')">
                        <div class="d-flex justify-content-between align-items-center">
                            <span><i class="bi bi-cash-stack me-2"></i> Pay at the Barbershop</span>
                            <i class="bi bi-circle text-muted" id="iconOffline"></i>
                        </div>
                    </div>

                    <!-- BOTÓN DINÁMICO -->
                    <div id="stripeButtonContainer">
                        <button type="button" class="btn btn-pay" th:onclick="'initiateStripe(' + ${appointment.id} + ')'">
                            <i class="bi bi-shield-lock-fill me-2"></i> PAY SECURELY WITH STRIPE
                        </button>
                    </div>

                    <form th:action="@{/appointments/pay-offline}" method="post" id="offlineForm" style="display: none;">
                        <input type="hidden" name="id" th:value="${appointment.id}">
                        <button type="submit" class="btn btn-pay" style="background: white; color: black;">
                            CONFIRM & PAY IN SHOP
                        </button>
                    </form>

                    <p class="text-center mt-4 small text-muted">
                        <i class="bi bi-lock-fill"></i> Your payment is processed securely.
                    </p>
                </div>
            </div>
        </div>
    </div>

    <!-- SCRIPTS -->
    <script src="https://js.stripe.com/v3/"></script>
    <script th:inline="javascript">
        // Cambiamos entre Stripe y Offline visualmente
        let currentMethod = 'online';

        function selectPayment(type) {
            currentMethod = type;
            const stripeBtn = document.getElementById('stripeButtonContainer');
            const offlineForm = document.getElementById('offlineForm');
            
            // Iconos y clases
            const iconOn = document.getElementById('iconOnline');
            const iconOff = document.getElementById('iconOffline');
            const optOn = document.getElementById('optionOnline');
            const optOff = document.getElementById('optionOffline');

            if(type === 'online') {
                stripeBtn.style.display = 'block';
                offlineForm.style.display = 'none';
                optOn.classList.add('active');
                optOff.classList.remove('active');
                iconOn.className = "bi bi-check-circle-fill text-gold";
                iconOff.className = "bi bi-circle text-muted";
            } else {
                stripeBtn.style.display = 'none';
                offlineForm.style.display = 'block';
                optOn.classList.remove('active');
                optOff.classList.add('active');
                iconOn.className = "bi bi-circle text-muted";
                iconOff.className = "bi bi-check-circle-fill text-gold";
            }
        }

        // FUNCIÓN STRIPE REAL
        const stripe = Stripe(/*[[${@environment.getProperty('stripe.public.key')}]]*/ 'tu_pk_test_aqui');

        function initiateStripe(appointmentId) {
            const btn = event.target;
            const originalText = btn.innerHTML;
            btn.disabled = true;
            btn.innerHTML = '<span class="spinner-border spinner-border-sm"></span> Redirecting...';

            fetch('/payment/create-checkout-session?appointmentId=' + appointmentId, {
                method: 'POST'
            })
            .then(res => res.json())
            .then(session => {
                if(session.id) {
                    stripe.redirectToCheckout({ sessionId: session.id });
                } else {
                    alert("Stripe Error: " + session.error);
                    btn.disabled = false;
                    btn.innerHTML = originalText;
                }
            })
            .catch(err => {
                alert("Connection error");
                btn.disabled = false;
                btn.innerHTML = originalText;
            });
        }
    </script>
</body>
</html>
