<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Checkout | The Kielce Barber</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;800&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #d4af37; --dark-card: rgba(0, 0, 0, 0.85); }
        body { 
            background: linear-gradient(rgba(0,0,0,0.92), rgba(0,0,0,0.95)), url('/images/fondo.jpg') no-repeat center center fixed; 
            background-size: cover; color: white; font-family: 'Montserrat', sans-serif; min-height: 100vh; 
        }
        .checkout-card { background: var(--dark-card); border: 1px solid var(--gold); border-radius: 25px; padding: 40px; backdrop-filter: blur(15px); }
        
        .payment-option { 
            border: 1px solid rgba(212, 175, 55, 0.2); border-radius: 15px; padding: 20px; 
            cursor: pointer; transition: 0.3s; background: rgba(255,255,255,0.03);
        }
        .payment-option:hover { border-color: var(--gold); background: rgba(212, 175, 55, 0.1); }
        
        .form-label-gold { color: var(--gold); font-size: 0.7rem; font-weight: 800; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 5px; }
        .form-control { background: rgba(0,0,0,0.5) !important; border: 1px solid rgba(212,175,55,0.3) !important; color: white !important; border-radius: 10px; padding: 12px 15px; }
        .form-control:focus { border-color: var(--gold); box-shadow: 0 0 10px rgba(212,175,55,0.2); }
        
        /* Ajuste para que el icono del calendario sea dorado y elegante */
        .input-group-text { background: rgba(0,0,0,0.5) !important; border: 1px solid rgba(212,175,55,0.3) !important; border-left: none !important; color: var(--gold); border-radius: 0 10px 10px 0; }
        .date-input { border-right: none !important; border-radius: 10px 0 0 10px !important; }

        .btn-pay { background: var(--gold); color: black; font-weight: 800; border-radius: 50px; border: none; padding: 15px; width: 100%; transition: 0.3s; margin-top: 20px; }
        .btn-pay:hover { background: white; transform: scale(1.02); }
        
        .btn-back {
            color: var(--gold); text-decoration: none; font-size: 0.9rem; font-weight: 700;
            transition: 0.3s; display: inline-flex; align-items: center; margin-bottom: 20px;
        }
        .btn-back:hover { color: white; transform: translateX(-5px); }
        .form-check-input:checked { background-color: var(--gold); border-color: var(--gold); }
    </style>
</head>
<body>
    <div class="container py-5">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <a th:href="@{/appointments/new}" class="btn-back">
                    <i class="bi bi-arrow-left-circle me-2 fs-5"></i> BACK TO BOOKING
                </a>

                <div class="checkout-card shadow-lg">
                    <h2 class="text-gold fw-800 mb-4 text-center">FINAL STEP</h2>
                    
                    <div class="mb-4 p-3 rounded" style="background: rgba(255,255,255,0.05); border: 1px dotted rgba(212,175,55,0.3);">
                        <p class="mb-1 small"><i class="bi bi-scissors text-gold me-2"></i> <span th:text="${appointment.service.name}">Service</span></p>
                        <p class="mb-1 small"><i class="bi bi-calendar-event text-gold me-2"></i> <span th:text="${appointment.date}">Date</span> at <span th:text="${appointment.time}">Time</span></p>
                        <p class="mb-0 fw-bold fs-4 text-gold text-center mt-2">$<span th:text="${appointment.price}">0.0</span></p>
                    </div>

                    <form th:action="@{/appointments/process-payment}" method="post" id="paymentForm">
                        <input type="hidden" name="appointmentId" th:value="${appointment.id}">
                        
                        <h6 class="text-gold mb-3 small fw-bold text-uppercase">Payment Method</h6>
                        
                        <div class="payment-option mb-3" onclick="selectPayment('online', this)">
                            <div class="d-flex justify-content-between align-items-center">
                                <span><i class="bi bi-credit-card-2-front me-2"></i> Online Payment (Card)</span>
                                <input class="form-check-input" type="radio" name="paymentMethod" value="ONLINE" id="radioOnline" required checked>
                            </div>
                        </div>

                        <div class="payment-option mb-4" onclick="selectPayment('offline', this)">
                            <div class="d-flex justify-content-between align-items-center">
                                <span><i class="bi bi-cash-stack me-2"></i> Pay at the Barbershop</span>
                                <input class="form-check-input" type="radio" name="paymentMethod" value="OFFLINE" id="radioOffline">
                            </div>
                        </div>

                        <div id="cardSection" class="mb-4">
                            <div class="mb-3">
                                <label class="form-label-gold">Cardholder Name</label>
                                <input type="text" name="cardHolderName" class="form-control" placeholder="Full Name" required 
                                       oninvalid="this.setCustomValidity('Please enter the cardholder name')" oninput="this.setCustomValidity('')">
                            </div>

                            <div class="mb-3">
                                <label class="form-label-gold">Card Number</label>
                                <input type="text" name="cardNumber" class="form-control" 
                                       placeholder="16 digits" pattern="\d{16}" maxlength="16"
                                       oninput="this.value = this.value.replace(/[^0-9]/g, ''); this.setCustomValidity('')"
                                       oninvalid="this.setCustomValidity('Please enter a valid 16-digit card number')" required>
                            </div>

                            <div class="row g-2">
                                <div class="col-6">
                                    <label class="form-label-gold">Expiry Date</label>
                                    <div class="input-group">
                                        <input type="text" id="expiryDisplay" class="form-control date-input" 
                                               placeholder="MM / YY" readonly required
                                               oninvalid="this.setCustomValidity('Please select expiry date')"
                                               onclick="document.getElementById('hiddenMonth').showPicker()">
                                        <span class="input-group-text"><i class="bi bi-calendar3"></i></span>
                                    </div>
                                    <input type="month" id="hiddenMonth" name="expiryDate" 
                                           style="position: absolute; opacity: 0; pointer-events: none;"
                                           onchange="updateExpiryDisplay(this.value)">
                                </div>
                                <div class="col-6">
                                    <label class="form-label-gold">CVC</label>
                                    <input type="text" name="cvc" class="form-control" 
                                           placeholder="3 digits" maxlength="3"
                                           oninput="this.value = this.value.replace(/[^0-9]/g, ''); this.setCustomValidity('')"
                                           oninvalid="this.setCustomValidity('Please enter the 3-digit security code')" required>
                                </div>
                            </div>
                        </div>

                        <button type="submit" class="btn btn-pay">CONFIRM APPOINTMENT</button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script>
        function updateExpiryDisplay(val) {
            if(!val) return;
            const [year, month] = val.split('-');
            // Formateamos para que se vea MM / YY
            document.getElementById('expiryDisplay').value = `${month} / ${year.substring(2)}`;
            document.getElementById('expiryDisplay').setCustomValidity('');
        }

        function selectPayment(type, element) {
            const cardSection = document.getElementById('cardSection');
            const cardInputs = cardSection.querySelectorAll('input:not(#hiddenMonth)');
            
            if(type === 'online') {
                cardSection.style.display = 'block';
                document.getElementById('radioOnline').checked = true;
                cardInputs.forEach(input => input.required = true);
            } else {
                cardSection.style.display = 'none';
                document.getElementById('radioOffline').checked = true;
                cardInputs.forEach(input => {
                    input.required = false;
                    input.setCustomValidity('');
                });
            }
        }

        window.onload = function() {
            const hiddenMonth = document.getElementById('hiddenMonth');
            const now = new Date();
            hiddenMonth.min = `${now.getFullYear()}-${String(now.getMonth() + 1).padStart(2, '0')}`;
            selectPayment('online');
        };
    </script>
</body>
</html>
