<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Payment Rejected | The Kielce Barber</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #121212; color: white; font-family: 'Segoe UI', sans-serif; height: 100vh; display: flex; align-items: center; justify-content: center; margin: 0; }
        .error-card { background: #1e1e1e; border: 2px solid #ff4b2b; border-radius: 20px; padding: 40px; text-align: center; max-width: 450px; box-shadow: 0 0 20px rgba(255, 75, 43, 0.2); }
        .icon-error { font-size: 5rem; color: #ff4b2b; margin-bottom: 20px; }
        .btn-retry { background-color: #ff4b2b; color: white; font-weight: bold; border-radius: 50px; padding: 12px 30px; text-decoration: none; display: inline-block; margin-top: 20px; }
    </style>
</head>
<body>
    <div class="error-card">
        <div class="icon-error">⚠️</div>
        <h2 class="fw-bold">PAYMENT REJECTED</h2>
        <p class="text-muted">We could not process the transaction. Your bank reported: <br><strong>[Insufficient Funds]</strong></p>
        <p>Please use a different card or contact your bank.</p>
        <a th:href="@{/dashboard}" class="btn-retry">Return to Dashboard</a>
    </div>
</body>
</html>
