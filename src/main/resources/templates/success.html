<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Payment Successful | The Kielce Barber</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #121212; color: white; font-family: 'Segoe UI', sans-serif; height: 100vh; display: flex; align-items: center; justify-content: center; }
        .success-card { background: #1e1e1e; border: 2px solid #2ecc71; border-radius: 20px; padding: 50px; text-align: center; max-width: 500px; }
        .icon-wallet { font-size: 5rem; color: #2ecc71; margin-bottom: 20px; }
        .btn-gold { background-color: #d4af37; color: black; font-weight: bold; border-radius: 50px; padding: 12px 30px; text-decoration: none; display: inline-block; }
    </style>
</head>
<body>
    <div class="success-card">
        <div class="icon-wallet">💳✨</div>
        <h2 class="fw-bold">PAYMENT CONFIRMED</h2>
        <p class="text-muted">We have received your payment correctly. You will receive an email with your appointment details shortly.</p>
        <p class="small text-uppercase mt-4" style="color: #d4af37;">See you soon at the shop!</p>
        <a th:href="@{/dashboard}" class="btn-gold mt-3">BACK TO DASHBOARD</a>
    </div>
</body>
</html>
