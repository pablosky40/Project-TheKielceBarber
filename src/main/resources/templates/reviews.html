<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Client Reviews | The Kielce Barber</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
    <style>
        :root { --gold: #d4af37; --glass: rgba(255, 255, 255, 0.05); }
        body { 
            background: linear-gradient(rgba(0,0,0,0.92), rgba(0,0,0,0.92)), url('/images/fondo.jpg');
            background-size: cover; background-attachment: fixed; color: white; 
            font-family: 'Segoe UI', sans-serif; min-height: 100vh;
        }
        .review-card { 
            background: var(--glass); border: 1px solid rgba(212,175,55,0.15);
            border-radius: 20px; padding: 25px; margin-bottom: 20px; backdrop-filter: blur(10px);
        }
        .star-gold { color: var(--gold); }
        .form-container { background: rgba(0,0,0,0.6); padding: 30px; border-radius: 25px; border: 1px solid var(--gold); }
        .btn-gold { background: var(--gold); color: black; font-weight: 800; border-radius: 12px; }
        
        /* Modal Style */
        .modal-content { background: #1a1a1a; border: 1px solid var(--gold); border-radius: 25px; color: white; }
        .btn-confirm-delete { background: #ff4d4d; color: white; border-radius: 12px; font-weight: 700; border: none; padding: 10px 25px; }
    </style>
</head>
<body>
    <div class="container py-5">
        <div class="text-center mb-5">
            <h1 class="display-4 fw-bold" style="color: var(--gold);">COMMUNITY REVIEWS</h1>
        </div>

        <div class="row g-5">
            <div class="col-lg-7">
                <div th:each="review : ${reviews}" class="review-card">
                    <div class="d-flex justify-content-between align-items-start">
                        <div>
                            <h5 class="mb-1 fw-bold text-white" th:text="${review.author}">Customer</h5>
                            <div class="mb-2">
                                <i th:each="i : ${#numbers.sequence(1, 5)}" 
                                   th:class="${i <= review.rating} ? 'bi bi-star-fill star-gold' : 'bi bi-star text-secondary'"></i>
                            </div>
                        </div>

                        <div class="d-flex gap-2" th:if="${review.author == userName}">
                            <button class="btn btn-sm btn-outline-warning border-0" 
                                    th:data-id="${review.id}" th:data-rating="${review.rating}" th:data-comment="${review.comment}"
                                    onclick="openEditModal(this)"><i class="bi bi-pencil-square"></i></button>
                            
                            <button class="btn btn-sm btn-outline-danger border-0" 
                                    th:onclick="'openDeleteModal(' + ${review.id} + ')'"><i class="bi bi-trash3"></i></button>
                        </div>
                    </div>
                    <p class="text-white-50 mt-2" th:text="${review.comment}">Comment...</p>
                </div>
            </div>

            <div class="col-lg-5">
                <div class="form-container sticky-top" style="top: 30px;">
                    <h3 class="mb-4 fw-bold text-center" style="color: var(--gold);">SHARE YOUR STYLE</h3>
                    <form th:action="@{/reviews/save}" method="post">
                        <input type="hidden" name="author" th:value="${userName}">
                        <div class="mb-3">
                            <label class="form-label small fw-bold text-gold">POSTING AS: <span class="text-white" th:text="${userName}">User</span></label>
                        </div>
                        <div class="mb-3">
                            <label class="form-label small fw-bold text-gold">RATING</label>
                            <select name="rating" class="form-select bg-dark text-white border-secondary">
                                <option value="5">⭐⭐⭐⭐⭐ Excellent</option>
                                <option value="4">⭐⭐⭐⭐ Very Good</option>
                                <option value="3">⭐⭐⭐ Good</option>
                            </select>
                        </div>
                        <div class="mb-4">
                            <label class="form-label small fw-bold text-gold">YOUR EXPERIENCE</label>
                            <textarea name="comment" class="form-control bg-dark text-white border-secondary" rows="4" required></textarea>
                        </div>
                        <button type="submit" class="btn btn-gold w-100 py-3">POST REVIEW ✨</button>
                    </form>
                    <div class="text-center mt-3"><a th:href="@{/dashboard}" class="text-white-50 small text-decoration-none">← Back to Dashboard</a></div>
                </div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="editReviewModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header border-0"><h5 class="modal-title fw-bold text-gold">EDIT REVIEW</h5></div>
                <form id="editReviewForm" method="post">
                    <div class="modal-body">
                        <select id="editRating" name="rating" class="form-select mb-3"><option value="5">⭐⭐⭐⭐⭐</option><option value="4">⭐⭐⭐⭐</option></select>
                        <textarea id="editComment" name="comment" class="form-control" rows="4" required></textarea>
                    </div>
                    <div class="modal-footer border-0">
                        <button type="button" class="btn text-white" data-bs-dismiss="modal">CANCEL</button>
                        <button type="submit" class="btn btn-gold">SAVE CHANGES</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <div class="modal fade" id="deleteReviewModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content text-center">
                <div class="modal-header border-0 justify-content-center pt-4"><h5 class="modal-title fw-bold text-danger">DELETE REVIEW</h5></div>
                <div class="modal-body p-4"><p>Are you sure? This review will be gone forever.</p></div>
                <div class="modal-footer border-0 justify-content-center pb-4">
                    <button type="button" class="btn text-white" data-bs-dismiss="modal">KEEP IT</button>
                    <form id="deleteReviewForm" method="post">
                        <button type="submit" class="btn btn-confirm-delete">YES, DELETE</button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script th:inline="javascript">
        let editModal, deleteModal;
        document.addEventListener('DOMContentLoaded', function() {
            editModal = new bootstrap.Modal(document.getElementById('editReviewModal'));
            deleteModal = new bootstrap.Modal(document.getElementById('deleteReviewModal'));
        });

        function openEditModal(btn) {
            document.getElementById('editReviewForm').action = '/reviews/edit/' + btn.getAttribute('data-id');
            document.getElementById('editRating').value = btn.getAttribute('data-rating');
            document.getElementById('editComment').value = btn.getAttribute('data-comment');
            editModal.show();
        }

        function openDeleteModal(id) {
            document.getElementById('deleteReviewForm').action = '/reviews/delete/' + id;
            deleteModal.show();
        }
    </script>
</body>
</html>
