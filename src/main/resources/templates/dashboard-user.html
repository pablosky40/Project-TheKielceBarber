<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>My Dashboard | The Kielce Barber</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;800&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #d4af37; --glass: rgba(255, 255, 255, 0.05); }
        body { background: linear-gradient(rgba(0,0,0,0.9), rgba(0,0,0,0.95)), url('/images/fondo.jpg') no-repeat center center fixed; background-size: cover; color: white; font-family: 'Montserrat', sans-serif; min-height: 100vh; }
        .navbar { background: rgba(0, 0, 0, 0.8); border-bottom: 1px solid rgba(255,255,255,0.1); }
        .text-gold { color: var(--gold); }
        .card-option { background: var(--glass); border: 1px solid rgba(255,255,255,0.1); border-radius: 20px; padding: 30px; text-align: center; text-decoration: none; display: block; transition: 0.3s; color: white; }
        .card-option:hover { border-color: var(--gold); transform: translateY(-5px); }
        .appt-card { background: var(--glass); border-radius: 20px; padding: 25px; border: 1px solid rgba(255,255,255,0.1); }
    </style>
</head>
<body>
    <nav class="navbar navbar-dark p-3">
        <div class="container d-flex justify-content-between">
            <span class="navbar-brand fw-bold text-gold">THE KIELCE BARBER</span>
            <form th:action="@{/logout}" method="post"><button class="btn btn-link text-white-50 text-decoration-none">LOGOUT</button></form>
        </div>
    </nav>

    <div class="container py-5">
        <div class="d-flex align-items-center justify-content-between mb-5">
            <h1>Welcome, <span class="text-gold" th:text="${userName}">User</span></h1>
            <img th:if="${userPhoto != null}" th:src="${userPhoto}" class="rounded-circle border border-warning" width="60">
        </div>

        <div class="row g-4 mb-5">
            <div class="col-md-4"><a th:href="@{/appointments/new}" class="card-option">📅<h4 class="mt-2">BOOK NOW</h4></a></div>
            <div class="col-md-4"><a th:href="@{/products}" class="card-option">💈<h4 class="mt-2">PRODUCTS</h4></a></div>
            <div class="col-md-4"><a th:href="@{/reviews}" class="card-option">✨<h4 class="mt-2">REVIEWS</h4></a></div>
        </div>

        <div class="appt-card">
            <h3 class="mb-4 text-gold">MY APPOINTMENTS</h3>
            <table class="table table-dark">
                <thead><tr><th>Date</th><th>Barber</th><th>Service</th><th>Action</th></tr></thead>
                <tbody>
                    <tr th:each="appt : ${appointments}">
                        <td><span th:text="${appt.date}">Date</span> <small class="text-gold" th:text="${appt.time}">Time</small></td>
                        <td th:text="${appt.barber}">Barber</td>
                        <td th:text="${appt.service}">Service</td>
                        <td>
                            <form th:action="@{/appointments/cancel/{id}(id=${appt.id})}" method="post">
                                <button class="btn btn-sm btn-outline-danger">Cancel</button>
                            </form>
                        </td>
                    </tr>
                </tbody>
            </table>
            <p th:if="${#lists.isEmpty(appointments)}" class="text-center text-muted">No appointments found.</p>
        </div>
    </div>
</body>
</html>
