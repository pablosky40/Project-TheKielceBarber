<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Book Experience | Kielce Barber</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;800&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #d4af37; --glass: rgba(0, 0, 0, 0.85); }
        body { 
            background: linear-gradient(rgba(0,0,0,0.8), rgba(0,0,0,0.8)), url('/images/fondo.jpg') no-repeat center center fixed;
            background-size: cover; color: white; font-family: 'Montserrat', sans-serif; 
            min-height: 100vh; display: flex; align-items: center; justify-content: center;
        }
        .booking-container {
            background: var(--glass); border: 1px solid rgba(212,175,55,0.3);
            border-radius: 30px; padding: 40px; backdrop-filter: blur(15px);
            max-width: 500px; width: 100%; box-shadow: 0 25px 50px rgba(0,0,0,0.6);
        }
        .form-label { color: var(--gold); font-weight: 700; font-size: 0.8rem; text-transform: uppercase; letter-spacing: 1px; }
        .form-control, .form-select {
            background: rgba(255,255,255,0.05) !important; border: 1px solid rgba(255,255,255,0.1) !important;
            color: white !important; border-radius: 12px; padding: 12px;
        }
        .form-select option { background-color: #121212; color: white; }
        
        .btn-confirm {
            background: var(--gold); color: black; font-weight: 800;
            border-radius: 15px; padding: 15px; width: 100%; border: none;
            transition: 0.3s; margin-top: 20px; text-transform: uppercase;
        }
        .btn-confirm:hover { background: white; transform: scale(1.02); }

        /* Estilo para el botón de volver */
        .btn-back {
            display: block; text-align: center; margin-top: 20px;
            color: rgba(255, 255, 255, 0.5); text-decoration: none;
            font-size: 0.8rem; font-weight: 600; text-transform: uppercase;
            letter-spacing: 1px; transition: 0.3s;
        }
        .btn-back:hover { color: var(--gold); }
        
        ::-webkit-calendar-picker-indicator { filter: invert(1); cursor: pointer; }
    </style>
</head>
<body>

    <div class="booking-container">
        <h2 class="text-center fw-bold text-uppercase mb-4">Book <span style="color:var(--gold)">Experience</span></h2>

        <form th:action="@{/appointments/save}" th:object="${appointment}" method="post">
            <div class="mb-3">
                <label class="form-label">Service</label>
                <select th:field="*{service}" class="form-select" required>
                    <option value="Classic Cut">Classic Cut - 20€</option>
                    <option value="Beard Trim">Beard Trim - 15€</option>
                    <option value="Full Experience">Full Experience - 35€</option>
                </select>
            </div>

            <div class="mb-3">
                <label class="form-label">Barber</label>
                <select th:field="*{barber}" class="form-select" required>
                    <option value="Pablo Santillana">Pablo Santillana</option>
                    <option value="Claudia López">Claudia López</option>
                </select>
            </div>

            <div class="row">
                <div class="col-6 mb-3">
                    <label class="form-label">Date</label>
                    <input type="date" th:field="*{date}" class="form-control" required>
                </div>
                <div class="col-6 mb-3">
                    <label class="form-label">Time</label>
                    <select th:field="*{time}" class="form-select" required>
                        <option value="" selected disabled>Hour</option>
                        <option value="10:00">10:00</option>
                        <option value="11:00">11:00</option>
                        <option value="12:00">12:00</option>
                        <option value="13:00">13:00</option>
                        <option value="17:00">17:00</option>
                        <option value="18:00">18:00</option>
                        <option value="19:00">19:00</option>
                        <option value="20:00">20:00</option>
                    </select>
                </div>
            </div>

            <button type="submit" class="btn btn-confirm">CONFIRM RESERVATION</button>
            
            <a th:href="@{/dashboard}" class="btn-back">
                <i class="bi bi-arrow-left"></i> Cancel and go back
            </a>
        </form>
    </div>

</body>
</html>
