<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Book your Style | The Kielce Barber</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;800&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #d4af37; --dark-bg: #0a0a0a; }
        
        body { 
            background: linear-gradient(rgba(0,0,0,0.92), rgba(0,0,0,0.95)), url('/images/fondo.jpg') no-repeat center center fixed; 
            background-size: cover; color: white; font-family: 'Montserrat', sans-serif; min-height: 100vh; 
        }

        .navbar { background: rgba(0, 0, 0, 0.9); border-bottom: 2px solid var(--gold); backdrop-filter: blur(10px); }
        .text-gold { color: var(--gold); }

        .booking-card {
            background: rgba(0, 0, 0, 0.85);
            border: 1px solid rgba(212, 175, 55, 0.3);
            border-radius: 25px;
            padding: 40px;
            backdrop-filter: blur(15px);
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }

        /* --- ESTILO SELECTORES NEGRO Y DORADO --- */
        .form-select {
            background-color: rgba(255, 255, 255, 0.05) !important;
            color: white !important;
            border: 1px solid rgba(212, 175, 55, 0.2) !important;
            border-radius: 12px;
            padding: 12px;
            /* Flecha dorada */
            background-image: url("data:image/svg+xml,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'%3e%3cpath fill='none' stroke='%23d4af37' stroke-linecap='round' stroke-linejoin='round' stroke-width='2' d='m2 5 6 6 6-6'/%3e%3c/svg%3e") !important;
        }

        .form-select option {
            background-color: #0f0f0f !important;
            color: white !important;
        }

        .form-select:focus {
            border-color: var(--gold) !important;
            box-shadow: 0 0 12px rgba(212, 175, 55, 0.2) !important;
        }

        /* --- TIME SLOTS --- */
        .time-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(100px, 1fr)); gap: 12px; }
        .slot-option input { position: absolute; opacity: 0; cursor: pointer; }
        
        .slot-label {
            display: block; padding: 15px 10px; background: rgba(255,255,255,0.03);
            border: 1px solid rgba(212, 175, 55, 0.2); border-radius: 12px;
            text-align: center; font-weight: 700; color: white; cursor: pointer;
            transition: 0.3s;
        }

        .slot-option input:checked + .slot-label {
            background: var(--gold); color: black; border-color: var(--gold);
            box-shadow: 0 0 15px rgba(212, 175, 55, 0.4);
        }

        .slot-option input:disabled + .slot-label {
            opacity: 0.2; cursor: not-allowed; text-decoration: line-through;
        }

        .btn-booking {
            background: var(--gold); color: black; font-weight: 800; text-transform: uppercase;
            letter-spacing: 2px; border-radius: 15px; padding: 15px; border: none; transition: 0.4s;
        }
        
        input[type="date"]::-webkit-calendar-picker-indicator { filter: invert(1); cursor: pointer; }
    </style>
</head>
<body>

    <nav class="navbar navbar-dark p-3 sticky-top">
        <div class="container d-flex justify-content-between">
            <a class="navbar-brand fw-bold text-gold" href="/dashboard">
                <i class="bi bi-scissors me-2"></i> THE KIELCE BARBER
            </a>
            <div class="d-flex align-items-center">
                <span class="me-3 small text-white-50" th:text="${userName}">User</span>
                <a href="/dashboard" class="btn btn-outline-light btn-sm rounded-pill px-4">Back to dashboard</a>
            </div>
        </div>
    </nav>

    <div class="container py-5">
        <div class="row justify-content-center">
            <div class="col-lg-8">
                <div class="booking-card">
                    <h2 class="fw-800 text-center mb-5">RESERVE YOUR <span class="text-gold">SPOT</span></h2>

                    <form th:action="@{/appointments/create}" method="post">
                        
                        <div class="row">
                            <div class="col-md-6 mb-4">
                                <label class="small fw-bold text-gold mb-2">SERVICE</label>
                                <select name="serviceId" class="form-select" required>
                                    <option value="" disabled selected>Choose a service...</option>
                                    <option th:each="service : ${services}" 
                                            th:value="${service.id}" 
                                            th:text="${service.name + ' - $' + service.price}"></option>
                                </select>
                            </div>

                            <div class="col-md-6 mb-4">
                                <label class="small fw-bold text-gold mb-2">BARBER</label>
                                <select name="barberId" id="barberSelect" class="form-select" required>
                                    <option value="" disabled selected>Choose professional...</option>
                                    <option th:each="barber : ${barbers}" 
                                            th:value="${barber.id}" 
                                            th:text="${barber.name}"></option>
                                </select>
                            </div>
                        </div>

                        <div class="mb-4">
                            <label class="small fw-bold text-gold mb-2">DATE</label>
                            <input type="date" name="date" id="dateInput" class="form-control" required style="background: rgba(255,255,255,0.05); color: white; border: 1px solid rgba(212,175,55,0.2);">
                        </div>

                        <div class="mb-5">
                            <label class="small fw-bold text-gold mb-3">AVAILABLE TIME SLOTS</label>
                            <div class="time-grid" id="timeGrid">
                                <div class="slot-option" th:each="h : ${ {'11:00', '12:00', '13:00', '16:00', '17:00', '18:00', '19:00', '20:00'} }">
                                    <input type="radio" name="time" th:id="${'h-' + h}" th:value="${h}" required>
                                    <label th:for="${'h-' + h}" class="slot-label" th:text="${h}"></label>
                                </div>
                            </div>
                        </div>

                        <button type="submit" class="btn btn-booking w-100">
                            PROCEED TO PAYMENT <i class="bi bi-arrow-right ms-2"></i>
                        </button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script th:inline="javascript">
        document.addEventListener('DOMContentLoaded', function() {
            const dateInput = document.getElementById('dateInput');
            const barberSelect = document.getElementById('barberSelect');
            const timeInputs = document.querySelectorAll('input[name="time"]');

            // Bloquear fechas pasadas
            const today = new Date().toISOString().split('T')[0];
            dateInput.setAttribute('min', today);

            function checkAvailability() {
                const date = dateInput.value;
                const barberId = barberSelect.value;
                if (!date || !barberId) return;

                fetch(`/appointments/check-availability?date=${date}&barberId=${barberId}`)
                    .then(response => response.json())
                    .then(occupiedTimes => {
                        const isFullDayBlocked = occupiedTimes.includes("FULL DAY");

                        timeInputs.forEach(input => {
                            // Si el día está bloqueado entero O la hora específica está en la lista
                            if (isFullDayBlocked || occupiedTimes.includes(input.value)) {
                                input.disabled = true;
                                input.checked = false;
                            } else {
                                input.disabled = false;
                            }
                        });
                        
                        // Mostrar un aviso si el día está completo
                        const msg = document.getElementById('noSlotsMsg');
                        if(msg) msg.style.display = isFullDayBlocked ? 'block' : 'none';
                    });
            }

            dateInput.addEventListener('change', checkAvailability);
            barberSelect.addEventListener('change', checkAvailability);
        });
    </script>
</body>
</html>
