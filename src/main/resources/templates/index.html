<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>The Kielce Barber | Authentic Grooming</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;700;900&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0; padding: 0; height: 100vh;
            display: flex; align-items: center; justify-content: center;
            background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.8)), 
                        url('/images/fondo.jpg') no-repeat center center fixed;
            background-size: cover;
            font-family: 'Montserrat', sans-serif;
            overflow: hidden;
        }

        .auth-card {
            background: rgba(10, 10, 10, 0.5) !important;
            padding: 45px 40px;
            border-radius: 35px;
            width: 100%; max-width: 440px;
            text-align: center;
            border: 1px solid rgba(212, 175, 55, 0.3);
            box-shadow: 0 20px 50px rgba(0,0,0,0.8);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
        }

        .logo-main {
            width: 130px;
            height: 130px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid #d4af37;
            margin-bottom: 15px;
            box-shadow: 0 0 25px rgba(212, 175, 55, 0.4);
        }

        .brand-logo { 
            color: #d4af37; 
            font-family: 'Playfair Display', serif;
            font-size: 2.2rem; 
            font-weight: 900; 
            text-transform: uppercase; 
            letter-spacing: 5px; 
            margin-bottom: 5px; 
        }

        .tagline { 
            color: rgba(255,255,255,0.7); 
            letter-spacing: 4px; 
            margin-bottom: 35px; 
            font-size: 0.8rem; 
            text-transform: uppercase; 
        }
        
        .btn-action { 
            font-weight: 700; 
            padding: 18px 30px; 
            border-radius: 15px; 
            text-transform: uppercase; 
            letter-spacing: 2px;
            text-decoration: none !important; 
            display: block; 
            width: 100%; 
            transition: 0.3s; 
            border: none; 
            font-size: 0.9rem;
        }
        
        .btn-signin { background: #d4af37; color: black; margin-bottom: 20px; }
        .btn-signin:hover { background: #f1c40f; transform: translateY(-3px); }

        .btn-register { 
            background: rgba(255, 255, 255, 0.05); 
            color: white; 
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        .btn-register:hover { 
            background: rgba(212, 175, 55, 0.15); 
            border-color: #d4af37; 
            color: #d4af37; 
            transform: translateY(-3px); 
        }

        .social-login { 
            margin-top: 30px; 
            border-top: 1px solid rgba(255,255,255,0.1); 
            padding-top: 25px; 
        }

        .social-title { 
            color: rgba(255,255,255,0.5); 
            font-size: 0.7rem; 
            text-transform: uppercase; 
            letter-spacing: 2px; 
            margin-bottom: 15px; 
        }

        .social-icon-box { 
            display: flex; 
            justify-content: center; 
        }
        
        .social-icon-link { 
            color: white !important; 
            background: rgba(255,255,255,0.05); 
            padding: 14px 25px; 
            border-radius: 12px; 
            display: inline-flex; 
            align-items: center;
            gap: 10px;
            transition: 0.3s; 
            border: 1px solid rgba(255,255,255,0.1); 
            text-decoration: none;
            font-size: 0.8rem;
            letter-spacing: 1px;
        }

        .social-icon-link:hover { 
            background: rgba(212, 175, 55, 0.2); 
            border-color: #d4af37; 
            transform: translateY(-3px); 
        }

        .error-msg {
            margin-top: 25px; 
            padding: 12px;
            background: rgba(220, 53, 69, 0.2);
            border: 1px solid rgba(220, 53, 69, 0.4);
            color: #ffffff; 
            border-radius: 12px; 
            font-size: 0.85rem;
            animation: fadeIn 0.5s ease-in;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <div class="auth-card">
        <img th:src="@{/images/barber-logo.jpg}" alt="Logo" class="logo-main">
        
        <div class="brand-logo">THE KIELCE</div>
        <div class="tagline">Barber Shop</div>

        <div class="d-flex flex-column mb-3">
            <a th:href="@{/oauth2/authorization/google}" onclick="setIntent('login')" class="btn-action btn-signin">
                SIGN IN
            </a>

            <a th:href="@{/oauth2/authorization/google}" onclick="setIntent('register')" class="btn-action btn-register">
                CREATE ACCOUNT
            </a>
        </div>

        <div class="social-login">
            <div class="social-title">WHERE ARE WE?</div>
            <div class="social-icon-box">
                <a th:href="@{/location}" class="social-icon-link" title="Our Location">
                    <i class="bi bi-geo-alt-fill" style="color: #d4af37;"></i>
                    <span>VIEW MAP</span>
                </a>
            </div>
        </div>

        <div th:if="${param.error}" class="error-msg" id="errorContainer">
            <i class="bi bi-exclamation-circle-fill me-2"></i>
            <span th:text="${param.error[0] == 'not_registered' ? 'This account is not registered. Please create an account first!' : 'Authentication error.'}"></span>
        </div>

        <div class="mt-4 text-white-50 small" style="letter-spacing: 1px; font-size: 0.65rem;">
            <i class="bi bi-shield-lock-fill"></i> SECURE OAUTH 2.0 ACCESS
        </div>
    </div>

    <script>
        // Esta función avisa al backend de qué botón se ha pulsado
        function setIntent(val) { 
            fetch('/set-intent?intent=' + val); 
        }

        window.onload = function() {
            // Limpiador de errores visuales tras 5 segundos
            if (window.location.search.includes('error')) {
                const errorDiv = document.getElementById('errorContainer');
                setTimeout(() => {
                    if (errorDiv) {
                        errorDiv.style.transition = "opacity 0.5s ease";
                        errorDiv.style.opacity = "0";
                        setTimeout(() => errorDiv.style.display = 'none', 500);
                    }
                    const url = new URL(window.location);
                    url.searchParams.delete('error');
                    window.history.replaceState({}, document.title, url.pathname);
                }, 5000);
            }
        };
    </script>
</body>
</html>
