<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>The Kielce Barber | Authentic Grooming</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
    <style>
        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            /* Fondo con la imagen que ya te funciona */
            background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.8)), 
                        url('/images/fondo.jpg') no-repeat center center fixed;
            background-size: cover;
            font-family: 'Montserrat', sans-serif;
            overflow: hidden;
        }

        .auth-card {
            background: rgba(10, 10, 10, 0.45) !important;
            padding: 50px 40px;
            border-radius: 35px;
            width: 100%;
            max-width: 440px;
            text-align: center;
            border: 1px solid rgba(212, 175, 55, 0.3);
            box-shadow: 0 20px 50px rgba(0,0,0,0.7);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
        }

        .brand-logo { 
            color: #d4af37; 
            font-size: 2.6rem; 
            font-weight: 900; 
            text-transform: uppercase; 
            letter-spacing: 5px;
            margin-bottom: 5px;
        }

        .tagline { 
            color: rgba(255,255,255,0.7); 
            letter-spacing: 4px; 
            margin-bottom: 40px; 
            font-size: 0.8rem;
            text-transform: uppercase;
        }
        
        /* Botón de Iniciar Sesión (Dorado Sólido) */
        .btn-signin { 
            background: #d4af37; 
            color: black; 
            font-weight: bold; 
            padding: 16px; 
            border-radius: 15px; 
            text-decoration: none !important; 
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-bottom: 20px;
            transition: 0.3s;
            border: none;
        }
        .btn-signin:hover { background: #f1c40f; transform: translateY(-3px); color: black; }

        /* Botón de Registro (Nuevo Color: Azul Acero / Oscuro Elegante) */
        .btn-register { 
            background: rgba(255, 255, 255, 0.1); 
            color: white; 
            font-weight: bold; 
            padding: 16px; 
            border-radius: 15px; 
            text-decoration: none !important; 
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            border: 1px solid rgba(255, 255, 255, 0.4);
            transition: 0.3s;
        }
        .btn-register:hover { 
            background: rgba(212, 175, 55, 0.2); 
            border-color: #d4af37;
            color: #d4af37;
            transform: translateY(-3px); 
        }

        /* Mensaje de Error */
        .error-msg {
            margin-top: 25px;
            padding: 12px;
            background: rgba(220, 53, 69, 0.2);
            border: 1px solid rgba(220, 53, 69, 0.4);
            color: #ff9999;
            border-radius: 12px;
            font-size: 0.85rem;
        }

        .google-icon { width: 20px; }
    </style>
</head>
<body>

    <div class="auth-card">
        <div class="brand-logo">THE KIELCE</div>
        <div class="tagline">Barber Shop</div>

        <div class="d-flex flex-column">
            <a href="/oauth2/authorization/google" onclick="setIntent('login')" class="btn-signin">
                <img src="https://authjs.dev/img/providers/google.svg" class="google-icon">
                SIGN IN WITH GOOGLE
            </a>

            <a href="/oauth2/authorization/google" onclick="setIntent('register')" class="btn-register">
                <img src="https://authjs.dev/img/providers/google.svg" class="google-icon">
                REGISTER ACCOUNT
            </a>
        </div>

        <div th:if="${param.error != null and param.error[0] == 'not_registered'}" class="error-msg">
            <i class="bi bi-exclamation-circle-fill me-2"></i>
            User not found. Please register first!
        </div>

        <div class="mt-4 text-white-50 small" style="letter-spacing: 1px; font-size: 0.7rem;">
            <i class="bi bi-shield-lock-fill"></i> SECURE OAUTH 2.0 ACCESS
        </div>
    </div>

    <script>
        function setIntent(val) { fetch('/set-intent?intent=' + val); }
    </script>
</body>
</html>
