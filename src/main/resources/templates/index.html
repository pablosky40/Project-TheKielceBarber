<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>The Kielce Barber | Home</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body, html { height: 100%; margin: 0; background-color: #000; overflow: hidden; font-family: 'Segoe UI', sans-serif; }
        .bg-image {
            background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)), 
                        url('https://images.unsplash.com/photo-1503951914875-452162b0f3f1?auto=format&fit=crop&q=80&w=1600');
            background-size: cover; background-position: center; height: 100%; display: flex; align-items: center; justify-content: center;
        }
        .content-box { text-align: center; color: white; padding: 40px; }
        .brand-title { font-size: 4rem; font-weight: 800; text-transform: uppercase; letter-spacing: 3px; color: white; }
        .brand-subtitle { font-size: 1.5rem; color: #ccc; margin-bottom: 50px; font-weight: 300; }
        .btn-gold { background-color: #d4af37; color: black; font-weight: bold; border-radius: 50px; padding: 15px 40px; font-size: 1.2rem; transition: 0.3s; text-transform: uppercase; text-decoration: none; display: inline-block; }
        .btn-gold:hover { background-color: #f1c40f; transform: translateY(-3px); box-shadow: 0 10px 20px rgba(212,175,55,0.3); color: black; }
        .btn-gold-outline { background-color: transparent; color: #d4af37; border: 2px solid #d4af37; border-radius: 50px; padding: 13px 40px; font-size: 1.2rem; font-weight: bold; transition: 0.3s; text-transform: uppercase; text-decoration: none; display: inline-block; }
        .btn-gold-outline:hover { background-color: rgba(212,175,55,0.1); color: #f1c40f; border-color: #f1c40f; transform: translateY(-3px); }
    </style>
</head>
<body>
    <div class="bg-image">
        <div class="content-box">
            <div class="mb-4" style="font-size: 3rem;">💈</div>
            <h1 class="brand-title">THE KIELCE BARBER</h1>
            <p class="brand-subtitle">Style, Tradition & Excellence</p>
            <div class="d-grid gap-3 d-sm-flex justify-content-sm-center">
                <a th:href="@{/oauth2/authorization/google}" class="btn btn-gold">Login</a>
                <a th:href="@{/oauth2/authorization/google}" class="btn btn-gold-outline">Register</a>
            </div>
        </div>
    </div>
</body>
</html>
