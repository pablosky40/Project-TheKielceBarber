<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Location | The Kielce Barber</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;700;900&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    
    <style>
        body { 
            background: linear-gradient(rgba(0,0,0,0.85), rgba(0,0,0,0.95)), url('/images/fondo.jpg') no-repeat center center fixed;
            background-size: cover;
            color: white; 
            text-align: center; 
            padding: 40px 20px;
            font-family: 'Montserrat', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .logo-top {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid #d4af37;
            margin-bottom: 20px;
            box-shadow: 0 0 20px rgba(212, 175, 55, 0.3);
        }

        h1 { 
            font-family: 'Playfair Display', serif;
            color: #d4af37; 
            letter-spacing: 4px; 
            font-weight: 700;
            text-transform: uppercase;
        }

        .address-text {
            color: rgba(255,255,255,0.7);
            letter-spacing: 2px;
            font-size: 0.9rem;
            margin-bottom: 30px;
        }

        .map-wrapper { 
            border: 3px solid rgba(212, 175, 55, 0.6); 
            border-radius: 25px; 
            overflow: hidden; 
            display: inline-block;
            box-shadow: 0 15px 40px rgba(0,0,0,0.8);
            width: 100%;
            max-width: 900px;
            background: white;
        }

        iframe {
            width: 100%;
            height: 500px;
            border: 0;
        }

        .btn-back { 
            background: transparent; 
            color: #d4af37; 
            font-weight: 700; 
            border: 2px solid #d4af37;
            border-radius: 12px; 
            padding: 12px 30px; 
            text-decoration: none; 
            transition: 0.3s;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-size: 0.8rem;
            margin-top: 40px;
            display: inline-flex;
            align-items: center;
            gap: 10px;
        }

        .btn-back:hover { 
            background: rgba(212, 175, 55, 0.2); 
            color: #f1c40f;
            transform: translateY(-3px); 
            border-color: #f1c40f;
        }
    </style>
</head>
<body>

    <img th:src="@{/images/barber-logo.jpg}" alt="The Kielce Barber" class="logo-top">

    <h1>Our Location</h1>
    <p class="address-text">
        <i class="bi bi-geo-alt-fill me-2" style="color: #d4af37;"></i> WARSZAWSKA 26, 25-368 KIELCE, POLAND
    </p>
    
    <div class="map-wrapper mb-4">
        <iframe 
            src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d2511.233543666504!2d20.635848277028916!3d50.88237295537553!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x47182806b71f9899%3A0x6a38618e77c5952!2sWarszawska%2026%2C%2025-312%20Kielce%2C%20Polonia!5e0!3m2!1sen!2ses!4v1715612345678!5m2!1sen!2ses" 
            allowfullscreen="" 
            loading="lazy" 
            referrerpolicy="no-referrer-when-downgrade">
        </iframe>
    </div>
    
    <a href="/" class="btn-back">
        <i class="bi bi-arrow-left"></i> Back to Home
    </a>

    <footer class="mt-5 text-white-50 small">
        © 2026 The Kielce Barber Shop - Professional Grooming
    </footer>

</body>
</html>
