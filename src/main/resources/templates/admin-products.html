<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Product Management | The Kielce Barber</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;800&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #d4af37; --glass: rgba(255, 255, 255, 0.05); }
        body { 
            background: linear-gradient(rgba(0,0,0,0.95), rgba(0,0,0,0.98)), url('/images/fondo.jpg') no-repeat center center fixed; 
            background-size: cover; color: white; font-family: 'Montserrat', sans-serif; min-height: 100vh;
        }
        .navbar { background: rgba(0, 0, 0, 0.9); border-bottom: 2px solid var(--gold); }
        .admin-card { 
            background: var(--glass); 
            border: 1px solid rgba(212, 175, 55, 0.2); 
            border-radius: 20px; 
            padding: 25px; 
            backdrop-filter: blur(10px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        /* RETOQUE DE LETRAS BLANCAS */
        .table { --bs-table-bg: transparent; margin-bottom: 0; }
        .table thead th { 
            color: var(--gold) !important; 
            text-transform: uppercase; 
            border-bottom: 2px solid var(--gold);
            font-weight: 800;
            letter-spacing: 1px;
        }
        /* Forzamos el blanco en todas las celdas del cuerpo */
        .table tbody td { 
            color: #ffffff !important; 
            font-weight: 500; 
            padding: 18px 10px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        
        .product-name-cell { font-weight: 700 !important; font-size: 1.05rem; }
        .price-cell { color: var(--gold) !important; font-weight: 800 !important; }

        .btn-gold { 
            background: var(--gold); 
            color: black; 
            font-weight: 800; 
            border-radius: 10px; 
            border: none; 
            transition: 0.3s;
        }
        .btn-gold:hover { background: white; transform: translateY(-2px); }

        .modal-content { background: #121212; border: 1px solid var(--gold); color: white; border-radius: 20px; }
        .form-control { background: #1a1a1a !important; color: white !important; border: 1px solid #444 !important; }
    </style>
</head>
<body>
    <nav class="navbar navbar-dark p-3 mb-5 sticky-top">
        <div class="container">
            <a class="navbar-brand fw-bold text-gold d-flex align-items-center" th:href="@{/dashboard-admin}">
                <i class="bi bi-arrow-left-circle me-2 fs-4"></i> BACK TO PANEL
            </a>
        </div>
    </nav>

    <div class="container">
        <div class="text-center mb-5">
            <h1 class="fw-bold display-5">Inventory <span class="text-gold">Control</span></h1>
            <p class="text-white-50">Manage prices and stock for your premium products</p>
        </div>

        <div class="admin-card">
            <div class="table-responsive">
                <table class="table align-middle">
                    <thead>
                        <tr>
                            <th>Product</th>
                            <th>Price</th>
                            <th>Stock</th>
                            <th class="text-end">Action</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="product : ${products}">
                            <td class="product-name-cell" th:text="${product.name}">Product Name</td>
                            <td class="price-cell" th:text="${product.price + ' €'}">0.00 €</td>
                            <td th:text="${product.stock + ' units'}">0 units</td>
                            <td class="text-end">
                                <button class="btn btn-sm btn-gold px-4 py-2" 
                                        th:data-id="${product.id}"
                                        th:data-name="${product.name}"
                                        th:data-price="${product.price}"
                                        th:data-stock="${product.stock}"
                                        onclick="openModal(this)">
                                    <i class="bi bi-pencil-fill me-1"></i> EDIT
                                </button>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <div class="modal fade" id="prodModal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <form th:action="@{/products/admin/update}" method="post" class="modal-content p-3 shadow-lg">
                <div class="modal-header border-0">
                    <h5 class="modal-title fw-bold">Update <span id="mName" class="text-gold"></span></h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <input type="hidden" name="id" id="mId">
                    <div class="mb-4">
                        <label class="form-label text-white-50 small fw-bold">NEW PRICE (€)</label>
                        <input type="number" step="0.01" name="price" id="mPrice" class="form-control form-control-lg" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label text-white-50 small fw-bold">NEW STOCK LEVEL</label>
                        <input type="number" name="stock" id="mStock" class="form-control form-control-lg" required>
                    </div>
                </div>
                <div class="modal-footer border-0">
                    <button type="submit" class="btn btn-gold w-100 py-3">SAVE CHANGES</button>
                </div>
            </form>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        function openModal(btn) {
            document.getElementById('mId').value = btn.getAttribute('data-id');
            document.getElementById('mName').innerText = btn.getAttribute('data-name');
            document.getElementById('mPrice').value = btn.getAttribute('data-price');
            document.getElementById('mStock').value = btn.getAttribute('data-stock');
            new bootstrap.Modal(document.getElementById('prodModal')).show();
        }
    </script>
</body>
</html>
