<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Product Management | The Kielce Barber</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;800&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #d4af37; --glass: rgba(255, 255, 255, 0.05); --red: #ff4d4d; }
        body { 
            background: linear-gradient(rgba(0,0,0,0.95), rgba(0,0,0,0.98)), url('/images/fondo.jpg') no-repeat center center fixed; 
            background-size: cover; color: white; font-family: 'Montserrat', sans-serif; min-height: 100vh;
        }
        .navbar { background: rgba(0, 0, 0, 0.9); border-bottom: 2px solid var(--gold); }
        .admin-card { 
            background: var(--glass); 
            border: 1px solid rgba(212, 175, 55, 0.2); 
            border-radius: 20px; 
            padding: 25px; 
            backdrop-filter: blur(10px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .table { --bs-table-bg: transparent; margin-bottom: 0; }
        .table thead th { 
            color: var(--gold) !important; 
            text-transform: uppercase; 
            border-bottom: 2px solid var(--gold);
            font-weight: 800;
            letter-spacing: 1px;
        }
        .table tbody td { 
            color: #ffffff !important; 
            font-weight: 500; 
            padding: 18px 10px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        
        .product-name-cell { font-weight: 700 !important; font-size: 1.05rem; }
        .brand-label { color: var(--gold); font-size: 0.7rem; font-weight: 800; text-transform: uppercase; letter-spacing: 1px; display: block; margin-top: 2px; }
        .price-cell { color: var(--gold) !important; font-weight: 800 !important; }

        .btn-gold { 
            background: var(--gold); 
            color: black; 
            font-weight: 800; 
            border-radius: 10px; 
            border: none; 
            transition: 0.3s;
        }
        .btn-gold:hover { background: white; transform: translateY(-2px); color: black; }

        .btn-delete {
            background: transparent;
            color: var(--red);
            border: 1px solid var(--red);
            border-radius: 10px;
            padding: 7px 12px;
            transition: 0.3s;
        }
        .btn-delete:hover {
            background: var(--red);
            color: white;
            box-shadow: 0 0 10px rgba(255, 77, 77, 0.3);
        }

        .modal-content { background: #121212; border: 1px solid var(--gold); color: white; border-radius: 20px; }
        .form-control { background: #1a1a1a !important; color: white !important; border: 1px solid #444 !important; }
        .form-control:focus { border-color: var(--gold); box-shadow: 0 0 10px rgba(212,175,55,0.2); }
        
        .form-label-gold { color: var(--gold); font-size: 0.75rem; font-weight: 800; text-transform: uppercase; margin-bottom: 8px; }

        input[type="file"]::file-selector-button {
            background-color: var(--gold);
            color: black;
            border: none;
            padding: 8px 15px;
            border-radius: 8px;
            cursor: pointer;
            margin-right: 15px;
            font-weight: 800;
            font-size: 0.7rem;
            text-transform: uppercase;
            transition: 0.3s;
        }
        input[type="file"]::file-selector-button:hover { background-color: white; }
    </style>
</head>
<body>
    <nav class="navbar navbar-dark p-3 mb-5 sticky-top">
        <div class="container">
            <a class="navbar-brand fw-bold text-gold d-flex align-items-center" th:href="@{/dashboard-admin}">
                <i class="bi bi-arrow-left-circle me-2 fs-4"></i> BACK TO PANEL
            </a>
        </div>
    </nav>

    <div class="container pb-5">
        <div class="d-flex justify-content-between align-items-end mb-5">
            <div>
                <h1 class="fw-bold display-5 mb-0">Inventory <span class="text-gold">Control</span></h1>
                <p class="text-white-50 mb-0">Manage prices and stock for your premium products</p>
            </div>
            <button class="btn btn-gold px-4 py-3 shadow" data-bs-toggle="modal" data-bs-target="#addProdModal">
                <i class="bi bi-plus-lg me-2"></i> ADD NEW PRODUCT
            </button>
        </div>

        <div class="admin-card">
            <div class="table-responsive">
                <table class="table align-middle">
                    <thead>
                        <tr>
                            <th>Product Information</th>
                            <th>Price</th>
                            <th>Stock</th>
                            <th class="text-end">Action</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="product : ${products}">
                            <td class="product-name-cell">
                                <span th:text="${product.name}">Product Name</span>
                                <span class="brand-label" th:text="${product.brand != null ? #strings.toUpperCase(product.brand) : 'NO BRAND'}">BRAND</span>
                            </td>
                            <td class="price-cell" th:text="${product.price + ' €'}">0.00 €</td>
                            <td th:text="${product.stock + ' units'}">0 units</td>
                            <td class="text-end">
                                <button class="btn btn-sm btn-gold px-3 py-2 me-1" 
                                        th:data-id="${product.id}"
                                        th:data-name="${product.name}"
                                        th:data-price="${product.price}"
                                        th:data-stock="${product.stock}"
                                        onclick="openEditModal(this)">
                                    <i class="bi bi-pencil-fill"></i>
                                </button>
                                
                                <button type="button" class="btn-delete" th:onclick="|confirmDelete('${product.id}')|">
                                    <i class="bi bi-trash-fill"></i>
                                </button>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <div class="modal fade" id="addProdModal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <form th:action="@{/products/admin/add}" method="post" enctype="multipart/form-data" class="modal-content p-3 shadow-lg">
                <div class="modal-header border-0">
                    <h5 class="modal-title fw-bold">Add <span class="text-gold">New Product</span></h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <div class="mb-3">
                        <label class="form-label-gold">NAME</label>
                        <input type="text" name="name" class="form-control" placeholder="e.g. Premium Wax" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label-gold">BRAND</label>
                        <input type="text" name="brand" class="form-control" placeholder="e.g. Uppercut, Reuzel, Suavecito..." required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label-gold">DESCRIPTION</label>
                        <textarea name="description" class="form-control" rows="2" placeholder="Brief details about the product" required></textarea>
                    </div>
                    <div class="row g-2 mb-3">
                        <div class="col-6">
                            <label class="form-label-gold">PRICE (€)</label>
                            <input type="number" step="0.01" name="price" class="form-control" placeholder="0.00" required>
                        </div>
                        <div class="col-6">
                            <label class="form-label-gold">INITIAL STOCK</label>
                            <input type="number" name="stock" class="form-control" placeholder="0" required>
                        </div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label-gold">PRODUCT IMAGE / LOGO</label>
                        <input type="file" name="imageFile" class="form-control" accept="image/*" required>
                    </div>
                </div>
                <div class="modal-footer border-0">
                    <button type="submit" class="btn btn-gold w-100 py-3">SAVE NEW PRODUCT</button>
                </div>
            </form>
        </div>
    </div>

    <div class="modal fade" id="prodModal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <form th:action="@{/products/admin/update}" method="post" class="modal-content p-3 shadow-lg">
                <div class="modal-header border-0">
                    <h5 class="modal-title fw-bold">Update <span id="mName" class="text-gold"></span></h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <input type="hidden" name="id" id="mId">
                    <div class="mb-4">
                        <label class="form-label-gold">NEW PRICE (€)</label>
                        <input type="number" step="0.01" name="price" id="mPrice" class="form-control form-control-lg" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label-gold">NEW STOCK LEVEL</label>
                        <input type="number" name="stock" id="mStock" class="form-control form-control-lg" required>
                    </div>
                </div>
                <div class="modal-footer border-0">
                    <button type="submit" class="btn btn-gold w-100 py-3">SAVE CHANGES</button>
                </div>
            </form>
        </div>
    </div>

    <div class="modal fade" id="deleteConfirmModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content" style="border: 1px solid var(--gold); border-radius: 20px;">
                <div class="modal-header border-0">
                    <h5 class="modal-title fw-bold text-gold">Confirm Action</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body text-center py-4">
                    <i class="bi bi-exclamation-octagon text-danger display-3 mb-3"></i>
                    <p class="fs-5">Are you sure you want to delete this product?</p>
                    <p class="text-white-50 small">This action cannot be undone.</p>
                </div>
                <div class="modal-footer border-0 justify-content-center pb-4">
                    <button type="button" class="btn btn-outline-secondary px-4" data-bs-dismiss="modal">CANCEL</button>
                    <form id="finalDeleteForm" method="post">
                        <button type="submit" class="btn btn-danger px-4 fw-bold">CONFIRM & DELETE</button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script th:inline="javascript">
        const deleteModal = new bootstrap.Modal(document.getElementById('deleteConfirmModal'));
        const deleteForm = document.getElementById('finalDeleteForm');

        function confirmDelete(id) {
            deleteForm.action = '/products/admin/delete/' + id;
            deleteModal.show();
        }

        function openEditModal(btn) {
            document.getElementById('mId').value = btn.getAttribute('data-id');
            document.getElementById('mName').innerText = btn.getAttribute('data-name');
            document.getElementById('mPrice').value = btn.getAttribute('data-price');
            document.getElementById('mStock').value = btn.getAttribute('data-stock');
            new bootstrap.Modal(document.getElementById('prodModal')).show();
        }
    </script>
</body>
</html>
