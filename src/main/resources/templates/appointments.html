<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Admin | Appointments</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #121212; color: white; font-family: 'Segoe UI', sans-serif; }
        .navbar { border-bottom: 1px solid #d4af37; background: #000; padding: 1rem 0; }
        .table { background: #1e1e1e; color: white; border-radius: 15px; overflow: hidden; }
        .table thead { background: #d4af37; color: black; }
        .btn-approve { background-color: #d4af37; border: none; font-weight: bold; color: black; }
    </style>
</head>
<body>
    <nav class="navbar navbar-dark mb-5"><div class="container"><span class="navbar-brand">💈 THE KIELCE BARBER - ADMIN</span></div></nav>
    <div class="container">
        <h2 class="mb-4 text-uppercase">Appointment List</h2>
        <table class="table align-middle">
            <thead>
                <tr><th>ID</th><th>Payment Status</th><th>Action</th></tr>
            </thead>
            <tbody>
                <tr th:each="appt : ${appointments}">
                    <td th:text="${appt.id}">1</td>
                    <td><span class="badge bg-secondary" th:text="${appt.paymentStatus}">PENDING</span></td>
                    <td><a th:href="@{/appointments/approve/{id}(id=${appt.id})}" class="btn btn-sm btn-approve">APPROVE PAYMENT</a></td>
                </tr>
            </tbody>
        </table>
        <a th:href="@{/dashboard}" class="text-muted text-decoration-none small">← Back to Dashboard</a>
    </div>
</body>
</html>
