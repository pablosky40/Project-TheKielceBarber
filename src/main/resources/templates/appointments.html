<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Gestión de Citas | The Kielce Barber</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #1a1a1a; color: white; }
        .table { color: white; border-color: #444; }
        .badge-paid { background-color: #d4af37; color: black; padding: 5px 10px; border-radius: 5px; }
        .badge-pending { background-color: #666; color: white; padding: 5px 10px; border-radius: 5px; }
        .btn-gold { background-color: #d4af37; color: black; border: none; font-weight: bold; }
        .navbar { border-bottom: 2px solid #d4af37; background-color: #000 !important; }
    </style>
</head>
<body>

    <nav class="navbar navbar-dark mb-5">
        <div class="container">
            <a class="navbar-brand" href="/">💈 THE KIELCE BARBER - ADMIN</a>
        </div>
    </nav>

    <div class="container">
        <h2 class="mb-4 text-uppercase">Listado de Citas</h2>
        <table class="table table-hover">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Estado de Pago</th>
                    <th>Acción</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="app : ${appointments}">
                    <td th:text="${app.id}">ID</td>
                    <td>
                        <span th:class="${app.paymentStatus == 'PAID' ? 'badge-paid' : 'badge-pending'}" 
                              th:text="${app.paymentStatus}">PENDING</span>
                    </td>
                    <td>
                        <a th:if="${app.paymentStatus != 'PAID'}" 
                           th:href="@{'/appointments/approve/' + ${app.id}}" 
                           class="btn btn-gold btn-sm">APROBAR PAGO</a>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>

</body>
</html>
