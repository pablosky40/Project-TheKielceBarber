<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Book Appointment | The Kielce Barber</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
    <style>
        :root { --gold: #d4af37; --dark-bg: #121212; }
        
        body { 
            background: linear-gradient(rgba(0,0,0,0.9), rgba(0,0,0,0.9)), 
                        url('/images/fondo.jpg') no-repeat center center fixed;
            background-size: cover;
            color: white; 
            font-family: 'Segoe UI', sans-serif; 
            min-height: 100vh;
            display: flex;
            align-items: center;
        }

        .booking-card { 
            background: rgba(255,255,255,0.05); 
            backdrop-filter: blur(15px);
            border-radius: 30px; 
            padding: 45px; 
            border: 1px solid rgba(212, 175, 55, 0.3); 
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }

        .form-label { color: var(--gold); font-weight: 600; font-size: 0.8rem; text-transform: uppercase; letter-spacing: 1px; }

        .form-control, .form-select { 
            background: rgba(0,0,0,0.3); 
            border: 1px solid rgba(255,255,255,0.1); 
            color: white; 
            border-radius: 12px;
            padding: 12px;
        }

        .form-control:focus, .form-select:focus { 
            background: rgba(0,0,0,0.5); 
            border-color: var(--gold); 
            color: white; 
            box-shadow: 0 0 15px rgba(212, 175, 55, 0.2); 
        }

        .btn-gold { 
            background: var(--gold); 
            color: black; 
            font-weight: 800; 
            border-radius: 15px; 
            padding: 15px; 
            border: none; 
            width: 100%; 
            transition: 0.4s;
            letter-spacing: 1px;
        }

        .btn-gold:hover:not(:disabled) { 
            background: #f1c40f; 
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(212, 175, 55, 0.3);
        }

        /* Estado deshabilitado (Ocupado) */
        .btn-gold:disabled { 
            background: #2a2a2a; 
            color: #555; 
            border: 1px solid #444;
            cursor: not-allowed; 
        }

        /* Animación de vibración para el mensaje de error */
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            20% { transform: translateX(-8px); }
            40% { transform: translateX(8px); }
            60% { transform: translateX(-8px); }
            80% { transform: translateX(8px); }
        }

        .error-shake { animation: shake 0.4s ease-in-out; }
        
        .availability-msg {
            background: rgba(220, 53, 69, 0.1);
            border: 1px solid rgba(220, 53, 69, 0.3);
            color: #ff4d4d;
            padding: 10px;
            border-radius: 10px;
            font-size: 0.85rem;
            display: none; /* Oculto por defecto */
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-6 col-lg-5">
                <div class="booking-card">
                    <h2 class="text-center mb-4 fw-bold" style="color: var(--gold); letter-spacing: 2px;">BOOK EXPERIENCE</h2>
                    
                    <form th:action="@{/appointments/save}" method="post">
                        <div class="mb-3">
                            <label class="form-label">Service</label>
                            <select name="service" class="form-select" required>
                                <option value="Classic Cut">Classic Cut - 20€</option>
                                <option value="Imperial Combo">Imperial Combo - 35€</option>
                                <option value="Beard Grooming">Beard Grooming - 15€</option>
                            </select>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Barber</label>
                            <select id="barberSelect" name="barber" class="form-select" required>
                                <option value="">Select Professional...</option>
                                <option value="Marco 'The Boss'">Marco "The Boss"</option>
                                <option value="Luca Scissorhands">Luca Scissorhands</option>
                            </select>
                        </div>

                        <div class="row">
                            <div class="col-md-7 mb-3">
                                <label class="form-label">Date</label>
                                <input id="dateInput" type="date" name="date" class="form-control" required>
                            </div>
                            <div class="col-md-5 mb-3">
                                <label class="form-label">Time</label>
                                <select id="timeSelect" name="time" class="form-select" required>
                                    <option value="">Hour</option>
                                    <option value="09:00">09:00 AM</option>
                                    <option value="10:00">10:00 AM</option>
                                    <option value="11:00">11:00 AM</option>
                                    <option value="16:00">04:00 PM</option>
                                    <option value="17:00">05:00 PM</option>
                                </select>
                            </div>
                        </div>

                        <div id="availability-msg" class="availability-msg text-center mb-4">
                            <i class="bi bi-calendar-x-fill me-2"></i> This slot is already booked.
                        </div>

                        <button id="submitBtn" type="submit" class="btn btn-gold">CONFIRM RESERVATION 💈</button>
                    </form>

                    <div class="text-center mt-4">
                        <a th:href="@{/dashboard}" class="text-white-50 text-decoration-none small" style="letter-spacing: 1px;">
                            <i class="bi bi-arrow-left me-1"></i> BACK TO DASHBOARD
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const barberSelect = document.getElementById('barberSelect');
        const dateInput = document.getElementById('dateInput');
        const timeSelect = document.getElementById('timeSelect');
        const submitBtn = document.getElementById('submitBtn');
        const msgDiv = document.getElementById('availability-msg');

        async function checkAvailability() {
            const barber = barberSelect.value;
            const date = dateInput.value;
            const time = timeSelect.value;

            if (barber && date && time) {
                try {
                    const response = await fetch(`/appointments/check-availability?barber=${encodeURIComponent(barber)}&date=${date}&time=${time}`);
                    const isAvailable = await response.json();

                    if (!isAvailable) {
                        // OCUPADO
                        submitBtn.disabled = true;
                        submitBtn.innerText = "NOT AVAILABLE";
                        msgDiv.style.display = 'block';
                        msgDiv.classList.add('error-shake'); // Efecto vibración
                        
                        // Quitar la clase de vibración después de que termine para poder repetirla
                        setTimeout(() => msgDiv.classList.remove('error-shake'), 400);
                    } else {
                        // LIBRE
                        submitBtn.disabled = false;
                        submitBtn.innerText = "CONFIRM RESERVATION 💈";
                        msgDiv.style.display = 'none';
                    }
                } catch (error) {
                    console.error("Error:", error);
                }
            }
        }

        // Escuchas de eventos
        barberSelect.addEventListener('change', checkAvailability);
        dateInput.addEventListener('change', checkAvailability);
        timeSelect.addEventListener('change', checkAvailability);
    </script>
</body>
</html>
