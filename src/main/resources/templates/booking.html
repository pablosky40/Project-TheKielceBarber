<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Book Appointment | The Kielce Barber</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #121212; color: white; font-family: 'Segoe UI', sans-serif; }
        .booking-card { background: #1e1e1e; border: 1px solid #d4af37; border-radius: 20px; padding: 30px; }
        .form-label { color: #d4af37; font-weight: bold; text-transform: uppercase; font-size: 0.8rem; }
        .form-control, .form-select { background-color: #2a2a2a; border: 1px solid #444; color: white; border-radius: 10px; }
        .form-control:focus, .form-select:focus { background-color: #333; border-color: #d4af37; color: white; box-shadow: none; }
        .btn-gold { background-color: #d4af37; color: black; font-weight: bold; border-radius: 50px; padding: 12px 30px; width: 100%; border: none; }
    </style>
</head>
<body>
    <div class="container py-5">
        <div class="row justify-content-center">
            <div class="col-md-6 text-center">
                <h2 class="fw-bold mb-4">BOOK YOUR <span style="color: #d4af37;">EXPERIENCE</span></h2>
                <div class="booking-card text-start">
                    <form th:action="@{/appointments/save}" method="post">
                        <div class="mb-3">
                            <label class="form-label">Service</label>
                            <select name="service" class="form-select" required>
                                <option value="Classic Cut">Classic Cut - 20€</option>
                                <option value="Premium Beard">Premium Beard - 15€</option>
                                <option value="Imperial Combo">Imperial Combo (Hair+Beard) - 30€</option>
                            </select>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Your Barber</label>
                            <select name="barber" class="form-select" required>
                                <option value="Marco 'The Boss'">Marco "The Boss"</option>
                                <option value="Luca Scissorhands">Luca Scissorhands</option>
                                <option value="Adrian Fade Master">Adrian Fade Master</option>
                            </select>
                        </div>
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Date</label>
                                <input type="date" name="date" class="form-control" required>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Time</label>
                                <select name="time" class="form-select" required>
                                    <option value="10:00">10:00 AM</option>
                                    <option value="12:00">12:00 PM</option>
                                    <option value="17:00">05:00 PM</option>
                                </select>
                            </div>
                        </div>
                        <button type="submit" class="btn-gold mt-4 text-uppercase">Confirm Reservation 💈</button>
                    </form>
                    <div class="text-center mt-3"><a th:href="@{/dashboard}" class="text-muted small">Back to Dashboard</a></div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
