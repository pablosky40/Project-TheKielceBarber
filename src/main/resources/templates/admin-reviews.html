<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Review Moderation | The Kielce Barber</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;800&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #d4af37; --glass: rgba(255, 255, 255, 0.05); }
        body { 
            background: linear-gradient(rgba(0,0,0,0.95), rgba(0,0,0,0.98)), url('/images/fondo.jpg') no-repeat center center fixed; 
            background-size: cover; color: white; font-family: 'Montserrat', sans-serif; min-height: 100vh;
        }
        .navbar { background: rgba(0, 0, 0, 0.9); border-bottom: 2px solid var(--gold); }
        .admin-card { background: var(--glass); border: 1px solid rgba(212, 175, 55, 0.2); border-radius: 25px; padding: 35px; backdrop-filter: blur(15px); }
        
        .table { --bs-table-bg: transparent; color: white !important; }
        .table thead th { color: var(--gold); text-transform: uppercase; border-bottom: 2px solid var(--gold); font-weight: 800; }
        
        .text-author { color: #ffffff !important; font-weight: 700; font-size: 1.1rem; }
        .text-comment { color: #ffffff !important; font-size: 0.95rem; margin-bottom: 10px; }
        
        /* CUADRO DE RESPUESTA DEL BARBERO */
        .barber-response { 
            background: rgba(212, 175, 55, 0.1); 
            border-left: 3px solid var(--gold); 
            padding: 10px 15px; 
            margin-top: 10px; 
            border-radius: 0 10px 10px 0;
            font-size: 0.85rem;
            color: #d4af37 !important;
        }

        .star-gold { color: var(--gold); }
        .btn-reply { background: var(--gold); color: black; font-weight: bold; border-radius: 12px; border: none; transition: 0.3s; }
        .btn-reply:hover { background: white; transform: scale(1.05); }
        .modal-content { background: #121212; border: 1px solid var(--gold); color: white; border-radius: 20px; }
    </style>
</head>
<body>
    <nav class="navbar navbar-dark p-3 mb-5">
        <div class="container">
            <a class="navbar-brand fw-bold text-gold" th:href="@{/dashboard-admin}">
                <i class="bi bi-arrow-left-circle me-2"></i> BACK TO PANEL
            </a>
        </div>
    </nav>

    <div class="container">
        <h1 class="fw-bold mb-4 text-center">Review <span class="text-gold">Moderation</span></h1>

        <div class="admin-card shadow-lg">
            <div class="table-responsive">
                <table class="table align-middle">
                    <thead>
                        <tr>
                            <th>Customer</th>
                            <th>Rating</th>
                            <th style="width: 60%;">Review & Your Reply</th>
                            <th class="text-end">Action</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="review : ${reviews}">
                            <td class="text-author" th:text="${review.author}">Customer Name</td>
                            <td class="star-gold text-nowrap">
                                <span th:text="${review.rating}"></span> <i class="bi bi-star-fill"></i>
                            </td>
                            <td>
                                <div class="text-comment" th:text="${review.comment}">Original comment...</div>
                                
                                <div th:if="${review.response != null}" class="barber-response">
                                    <strong class="text-uppercase small">Your Response:</strong><br>
                                    <span th:text="${review.response}">Thanks for coming!</span>
                                </div>
                            </td>
                            <td class="text-end">
                                <button class="btn btn-sm btn-reply px-3 py-2" 
                                        th:data-id="${review.id}" 
                                        th:data-author="${review.author}"
                                        th:data-response="${review.response}"
                                        onclick="openReplyModal(this)">
                                    <i class="bi bi-reply-fill me-1"></i> REPLY
                                </button>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <div class="modal fade" id="replyModal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <form th:action="@{/reviews/admin/update}" method="post" class="modal-content shadow-lg">
                <div class="modal-header border-secondary">
                    <h5 class="modal-title">Reply to <span id="replyTo" class="text-gold">Customer</span></h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <input type="hidden" name="id" id="editId">
                    <label class="form-label text-white-50 small">OFFICIAL BARBER RESPONSE</label>
                    <div class="mb-3">
                        <textarea name="response" id="editResponse" class="form-control bg-dark text-white border-secondary" rows="5" placeholder="Write your official response here..."></textarea>
                    </div>
                </div>
                <div class="modal-footer border-0">
                    <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">Cancel</button>
                    <button type="submit" class="btn btn-reply px-4">Post Official Reply</button>
                </div>
            </form>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        function openReplyModal(btn) {
            document.getElementById('editId').value = btn.getAttribute('data-id');
            document.getElementById('replyTo').innerText = btn.getAttribute('data-author');
            // Cargamos la respuesta actual si ya existe, si no, vacío
            document.getElementById('editResponse').value = btn.getAttribute('data-response') || "";
            
            new bootstrap.Modal(document.getElementById('replyModal')).show();
        }
    </script>
</body>
</html>
